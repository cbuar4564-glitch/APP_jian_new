<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>퀴즈 한 입 — 골라 푸는 상식·공부 퀴즈</title>
<style>
  :root{
    --bg1:#f0fbf8; --bg2:#e2f5ef; --ink:#15302a; --sub:#5f7d74; --card:#ffffff;
    --line:#d6ece4; --accent:#10b585; --accent-d:#0a9c70; --o:#10b585; --x:#ef6b5b;
    --gold:#f5b62e; --shadow:0 8px 26px rgba(20,120,90,.13);
  }
  *{box-sizing:border-box}
  body{
    margin:0; color:var(--ink); min-height:100vh;
    background:radial-gradient(900px 500px at 80% -10%, #c8f0e3 0%, transparent 55%), linear-gradient(160deg,var(--bg1),var(--bg2));
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:500px; margin:0 auto; padding:18px 16px 50px;}
  .backlink{display:inline-block; margin-bottom:8px; color:var(--sub); font-size:12.5px; text-decoration:none;}
  .backlink:hover{color:var(--accent);}
  header h1{font-size:23px; margin:2px 0 2px;}
  header p{margin:0 0 14px; color:var(--sub); font-size:13.5px;}

  /* 허브(주제 선택) */
  .packs{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
  .pack{
    background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px 14px; cursor:pointer;
    box-shadow:var(--shadow); transition:.13s; text-align:left;
  }
  .pack:active{transform:scale(.98);}
  .pack.soon{opacity:.55; cursor:default;}
  .pack .pe{font-size:30px;}
  .pack h3{margin:8px 0 2px; font-size:16px;}
  .pack .ps{font-size:12px; color:var(--sub);}
  .pack .pc{display:inline-block; margin-top:8px; font-size:11px; font-weight:800; color:var(--accent-d); background:#e3f7f0; border-radius:999px; padding:3px 9px;}
  .pack.soon .pc{color:#9b8; background:#eef4f1;}

  .progress{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .bar{flex:1; height:9px; background:#d6ece4; border-radius:99px; overflow:hidden;}
  .bar > div{height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width .3s;}
  .pcount{font-size:12.5px; color:var(--sub); font-weight:700; white-space:nowrap;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px 18px; box-shadow:var(--shadow); text-align:center;}
  .cat{display:inline-block; font-size:11.5px; font-weight:800; color:var(--accent-d); background:#e3f7f0; border-radius:999px; padding:4px 11px; margin-bottom:14px;}
  .stmt{font-size:21px; font-weight:800; line-height:1.5; min-height:72px; display:flex; align-items:center; justify-content:center; word-break:keep-all;}
  .ask{font-size:13px; color:var(--sub); margin:6px 0 16px;}
  .choices{display:flex; gap:10px;}
  .choices.col{flex-direction:column;}
  .choices button{
    flex:1; padding:16px 10px; border:2px solid var(--line); background:#fff; border-radius:14px;
    font-size:16px; font-weight:800; cursor:pointer; transition:.12s; color:var(--ink);
  }
  .choices.row button{font-size:18px; font-weight:900;}
  .choices .real{color:var(--o);} .choices .fake{color:var(--x);}
  .choices button:active{transform:scale(.98);}
  .choices button:disabled{cursor:default;}
  .choices button.correct{border-color:var(--accent); background:#eafaf4; color:var(--accent-d);}
  .choices button.wrong{border-color:var(--x); background:#fdeeec; color:var(--x);}

  .reveal{display:none; margin-top:16px;}
  .reveal.show{display:block; animation:pop .3s ease;}
  @keyframes pop{from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1}}
  .verdict{font-size:21px; font-weight:900; margin-bottom:6px;}
  .verdict.ok{color:var(--o);} .verdict.no{color:var(--x);}
  .truth{font-size:14.5px; color:#33514a; background:#f3faf7; border:1px solid var(--line); border-radius:12px; padding:13px; text-align:left;}
  .next{margin-top:12px; width:100%; padding:14px; border:0; border-radius:14px; background:var(--accent); color:#fff; font-size:16px; font-weight:800; cursor:pointer;}
  .next:active{background:var(--accent-d);}

  .result{text-align:center;}
  .result .big{font-size:54px; font-weight:900; color:var(--accent-d); margin:6px 0 0;}
  .result .msg{font-size:16px; font-weight:800; margin:4px 0 2px;}
  .result .sub{font-size:13.5px; color:var(--sub); margin-bottom:16px;}
  .result .row{display:flex; gap:10px;}
  .result .row button{flex:1; padding:13px; border-radius:13px; font-weight:800; font-size:14px; cursor:pointer; border:1px solid var(--line);}
  .share{border:0 !important; background:var(--accent); color:#fff;} .share.done{background:var(--gold); color:#3a2a00;}
  .again{background:#fff; color:var(--accent-d);}
  .home{background:#f3faf7; color:var(--sub);}

  .notice{margin-top:16px; background:#fff8ec; border:1px solid #fde7c0; color:#8a5a16; font-size:12px; border-radius:12px; padding:10px 12px;}
  footer{text-align:center; color:#9bb8af; font-size:11.5px; margin-top:16px;}
  .hide{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="../index.html">← 다른 앱 보기</a>
  <header>
    <h1 id="title">🧠 퀴즈 한 입</h1>
    <p id="subtitle">골라 푸는 상식·공부 퀴즈 — 맞혀보고 친구한테 공유!</p>
  </header>

  <!-- 허브: 주제 선택 -->
  <div id="hub"><div class="packs" id="packs"></div>
    <div class="notice">💡 재미·참고용이에요. 건강·의학·육아 관련은 전문가와 상담하세요.</div>
  </div>

  <!-- 퀴즈 -->
  <div id="quiz" class="hide">
    <div class="progress"><div class="bar"><div id="barFill"></div></div><span class="pcount" id="pcount">1 / 10</span></div>
    <div class="card">
      <span class="cat" id="cat">생활</span>
      <div class="stmt" id="stmt">—</div>
      <div class="ask" id="ask">이 말, 진짜일까요 가짜일까요?</div>
      <div class="choices" id="choices"></div>
      <div class="reveal" id="reveal">
        <div class="verdict" id="verdict">—</div>
        <div class="truth" id="truth"></div>
        <button class="next" id="nextBtn">다음 →</button>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div id="resultWrap" class="hide">
    <div class="card result" id="result">
      <div class="msg" id="rmsg">결과</div>
      <div class="big" id="rscore">0/10</div>
      <div class="sub" id="rsub"></div>
      <div class="row">
        <button class="share" id="shareBtn">결과 공유 📋</button>
        <button class="again" id="againBtn">다시 풀기</button>
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="home" id="homeBtn">← 다른 퀴즈 고르기</button>
      </div>
    </div>
  </div>

  <footer>퀴즈 한 입 · 모든 처리는 기기 안에서만 · 재미·참고용</footer>
</div>

<script>
  const $ = id => document.getElementById(id);
  const BASE = 'https://cbuar4564-glitch.github.io/APP_jian_new/truth-quiz/';

  // ───────── 퀴즈 묶음 ─────────
  const PACKS = [
    { id:'life', emoji:'🧠', title:'생활 상식 오해', sub:'진짜일까 가짜일까?', type:'ox', cards:[
      { cat:'청소·생활', stmt:'거품이 풍성하게 많이 날수록 더 깨끗하게 닦인다', isTrue:false, truth:'거품의 양과 세척력은 관계가 없어요. 때를 떼는 건 세정 성분과 문지르는 힘이고, 거품을 거의 안 내는 세제도 잘 닦여요.' },
      { cat:'청소·생활', stmt:'락스와 식초를 섞으면 더 강력한 청소 효과가 난다', isTrue:false, truth:'두 가지를 섞으면 유독한 염소 가스가 나와 위험해요. 효과가 좋아지긴커녕 호흡기에 해로우니 절대 섞지 마세요.' },
      { cat:'청소·생활', stmt:'세제는 권장량보다 많이 넣을수록 빨래가 더 깨끗해진다', isTrue:false, truth:'많이 넣으면 헹굼으로 다 빠지지 않아 옷·세탁기에 잔여물이 남아요. 냄새·피부자극의 원인이 될 수 있어요.' },
      { cat:'청소·생활', stmt:'뜨거운 물로 손을 씻어야 세균이 더 잘 제거된다', isTrue:false, truth:'사람이 견디는 온도로는 세균이 안 죽어요. 중요한 건 온도가 아니라 비누로 20초 이상 충분히 문질러 헹구는 거예요.' },
      { cat:'청소·생활', stmt:'주방 행주·수세미가 화장실 변기보다 세균이 더 많을 수 있다', isTrue:true, truth:'진짜예요. 젖어 있고 음식 찌꺼기가 남아 세균 번식에 최적이라, 변기보다 더 많이 검출되기도 해요. 자주 삶거나 바꿔주세요.' },
      { cat:'청소·생활', stmt:'베이킹소다와 식초를 섞으면 강력한 만능 세정제가 된다', isTrue:false, truth:'둘을 섞으면 산-염기 중화로 효과가 서로 상쇄돼 세정력이 세지지 않아요. 보글거림은 이산화탄소가 빠지는 반응일 뿐이에요.' },
      { cat:'건강·몸', stmt:'손가락 관절을 꺾어 "뚝" 소리를 내면 관절염에 걸린다', isTrue:false, truth:'그 소리는 관절액 속 기포가 터지는 거예요. 관절염을 일으킨다는 근거는 약해요(무리하게 꺾는 습관은 비권장).' },
      { cat:'건강·몸', stmt:'사람은 평소 뇌의 10%만 사용한다', isTrue:false, truth:'뇌 영상 연구에서 하루 중 거의 모든 영역이 활동해요. "10%만 쓴다"는 유명한 속설이에요.' },
      { cat:'건강·몸', stmt:'어두운 곳에서 책을 읽으면 시력이 영구적으로 나빠진다', isTrue:false, truth:'눈이 피로하고 일시적으로 불편할 수 있지만, 그 자체가 시력을 영구히 망친다는 근거는 약해요.' },
      { cat:'건강·몸', stmt:'성인의 정상 체온은 항상 정확히 36.5도다', isTrue:false, truth:'정상 체온은 사람·시간·부위에 따라 36~37.5도로 달라요. 36.5도는 평균에 가까운 값일 뿐이에요.' },
      { cat:'건강·몸', stmt:'위(胃) 안쪽 점막은 며칠 단위로 계속 새것으로 교체된다', isTrue:true, truth:'맞아요. 위 점막 세포는 강한 위산에 노출돼 빠르게 손상되고, 대체로 며칠 주기로 새 세포로 교체돼요.' },
      { cat:'건강·몸', stmt:'감기에는 항생제가 잘 듣는다', isTrue:false, truth:'감기는 대부분 바이러스 때문이고 항생제는 세균에만 들어요. (복용은 전문가 안내에 따르세요)' },
      { cat:'건강·몸', stmt:'면도를 하면 털이 더 굵고 검게 자란다', isTrue:false, truth:'굵어 보이는 건 잘린 단면 때문이에요. 실제 털의 굵기나 색은 면도로 바뀌지 않아요.' },
      { cat:'건강·몸', stmt:'물은 누구나 하루에 꼭 2리터를 마셔야 한다', isTrue:false, truth:'정해진 양은 없어요. 음식·활동량·개인차에 따라 필요한 수분량이 달라요.' },
      { cat:'음식', stmt:'MSG(글루타민산나트륨)는 몸에 해로워 먹으면 두통이 생긴다', isTrue:false, truth:'MSG는 다시마·토마토·치즈에도 든 감칠맛 성분으로, 보통 조미량에서 해롭다는 근거는 없어요. "중국집 증후군"도 재현 연구에서 입증되지 못했어요.' },
      { cat:'음식', stmt:'갈색 설탕(흑설탕)은 흰 설탕보다 훨씬 건강에 좋다', isTrue:false, truth:'흑설탕은 흰 설탕에 당밀을 약간 더한 것일 뿐 영양 차이는 거의 없어요. 칼로리·혈당 영향도 비슷해요.' },
      { cat:'음식', stmt:'당근을 많이 먹으면 피부가 주황빛으로 변할 수 있다', isTrue:true, truth:'진짜예요. 베타카로틴을 과다 섭취하면 피부가 주황빛이 도는 "카로틴혈증"이 생길 수 있어요. 대체로 무해하고 줄이면 돌아와요.' },
      { cat:'음식', stmt:'유통기한이 지난 식품은 그 날짜가 지나면 바로 먹으면 안 된다', isTrue:false, truth:'유통기한은 "판매 가능 기한"이라 보관만 잘하면 그 뒤로도 먹을 수 있는 경우가 많아요. 실제 기준은 "소비기한"에 가까워요.' },
      { cat:'음식', stmt:'꿀은 상온에서 거의 상하지 않고 아주 오래 보관할 수 있다', isTrue:true, truth:'맞아요. 꿀은 수분이 적고 천연 산성이라 세균이 잘 못 자라 밀봉하면 오래가요. 단 만 1세 미만 아기에겐 주지 마세요(보툴리눔균).' },
      { cat:'과학·자연', stmt:'박쥐는 눈이 멀어서 아무것도 못 본다', isTrue:false, truth:'박쥐는 대부분 눈이 있고 볼 수 있어요. 어두운 곳에선 초음파를 함께 쓸 뿐, 시력이 아예 없는 건 아니에요.' },
      { cat:'과학·자연', stmt:'금붕어의 기억력은 3초밖에 안 된다', isTrue:false, truth:'금붕어는 몇 달까지 기억한다는 연구가 여럿 있어요. 먹이 시간이나 미로 길을 학습해 기억해요.' },
      { cat:'과학·자연', stmt:'낙타의 혹에는 물이 들어 있다', isTrue:false, truth:'혹에는 물이 아니라 주로 지방이 저장돼 있어요. 이 지방을 에너지로 쓰며 일부 물도 만들어져요.' },
      { cat:'과학·자연', stmt:'번개는 같은 자리에 두 번 치지 않는다', isTrue:false, truth:'번개는 같은 곳에 여러 번 칠 수 있어요. 특히 높은 건물·탑은 한 해에도 수십 번 맞아요.' },
      { cat:'과학·자연', stmt:'꿀벌은 사람을 쏘면 대부분 자기도 죽는다', isTrue:true, truth:'맞아요. 꿀벌 침은 미늘이 있어 피부에 박히면 내장 일부가 떨어져 나와 죽어요. 단 말벌은 여러 번 쏘고도 안 죽어요.' },
      { cat:'과학·자연', stmt:'비 올 때 뛰어가면 걷는 것보다 덜 젖는다', isTrue:true, truth:'진짜! 비를 맞는 시간이 줄어들어 대체로 덜 젖어요.' },
      { cat:'돈·기기', stmt:'스마트폰 백그라운드 앱을 자주 꺼주면 배터리가 오래간다', isTrue:false, truth:'요즘 폰은 백그라운드 앱을 거의 전력 안 쓰게 관리해요. 오히려 자꾸 닫으면 다시 켤 때 전력을 더 쓸 수 있어요.' },
      { cat:'돈·기기', stmt:'USB 3 포트는 낮은 번호 포트보다 무조건 빠르다', isTrue:false, truth:'숫자는 포트 규격이고, 실제 속도는 포트·케이블·기기가 모두 상위 규격일 때만 빨라져요. 케이블이 구형이면 USB3 포트도 느려요.' },
      { cat:'돈·기기', stmt:'충전기를 콘센트에 꽂아만 두고 폰을 안 꽂아도 전기요금이 꽤 나간다', isTrue:false, truth:'안 꽂은 충전기의 대기 전력은 0.1~0.5W로 아주 작아요. 1년 내내 꽂아둬도 전기요금은 몇백 원 안팎이에요.' },
      { cat:'돈·기기', stmt:'스마트폰은 0%까지 쓰고 100%까지 채우길 반복하면 배터리에 좋다', isTrue:false, truth:'요즘 리튬 배터리는 20~80% 사이로 자주 충전하는 게 더 오래가요.' },
      { cat:"생활 상식", stmt:"토마토는 냉장고에 보관해야 가장 신선하게 오래 먹을 수 있다.", isTrue:false, truth:"익은 토마토를 냉장 보관하면 저온이 향을 내는 효소 작용을 방해하고 세포막을 손상시켜 맛이 밍밍해지고 식감이 푸석해진다. 완전히 익은 토마토는 실온의 직사광선을 피한 곳에 두는 것이 풍미 유지에 좋고, 냉장은 너무 익어 빨리 상할 때 단기 보관용으로만 권장된다." },
      { cat:"생활 상식", stmt:"꿀은 상온에서도 거의 영구적으로 상하지 않는 식품이다.", isTrue:true, truth:"꿀은 수분 함량이 매우 낮고 당도가 높아 미생물이 자라기 어려운 데다, 산성이고 벌이 만든 과정에서 소량의 과산화수소가 생겨 항균 작용을 한다. 밀봉해 두면 수천 년 된 고대 이집트 무덤의 꿀도 먹을 수 있는 상태로 발견될 정도로 사실상 변질되지 않는다(결정화는 변질이 아니라 정상 현상)." },
      { cat:"생활 상식", stmt:"근육 운동을 멈추면 그 근육이 지방으로 변한다.", isTrue:false, truth:"근육과 지방은 서로 다른 조직이라 하나가 다른 하나로 바뀔 수 없다. 운동을 그만두면 근육은 작아지고(위축), 활동량 감소로 소비 열량이 줄면서 지방이 따로 늘어나는 것이다. 둘이 동시에 일어나 '근육이 지방이 됐다'고 착각하는 것뿐이다." },
      { cat:"생활 상식", stmt:"운동 다음 날 생기는 근육통은 몸속에 쌓인 젖산 때문이다.", isTrue:false, truth:"운동 후 하루이틀 뒤 나타나는 지연성 근육통(DOMS)은 젖산과 관계가 없다. 젖산은 운동이 끝나면 보통 한 시간 안에 대부분 제거된다. 지연성 근육통은 평소보다 강한 운동으로 근섬유에 생긴 미세 손상과 그에 따른 염증 반응 때문에 생긴다." },
      { cat:"생활 상식", stmt:"비싼 와인일수록 일반인이 블라인드 테스트에서 더 맛있다고 평가한다.", isTrue:false, truth:"여러 블라인드 시음 실험에서 일반 소비자는 가격과 선호도 사이에 뚜렷한 상관관계를 보이지 못했고, 오히려 약간 역상관이 나오기도 했다. 가격표를 보여주면 비싼 와인을 더 맛있게 느끼는데, 이는 가격 정보가 뇌의 기대를 바꿔 실제 만족감에 영향을 주는 심리 효과 때문이다." },
      { cat:"생활 상식", stmt:"신용카드 할부는 무이자만 아니면 결제 금액에 따라 이자가 붙는다.", isTrue:true, truth:"일반 유이자 할부는 약정한 할부 수수료율에 따라 남은 잔액에 매달 수수료가 붙는다. 흔히 '무이자 할부'를 떠올려 할부엔 이자가 없다고 오해하지만, 무이자가 아닌 할부는 사실상 대출처럼 수수료(이자)가 부과되므로 할부 개월 수가 길수록 총 부담이 커진다." },
      { cat:"생활 상식", stmt:"정전기로 인한 감전을 막으려면 주유 중 차 안에 들어갔다 나오지 않는 것이 좋다.", isTrue:true, truth:"주유 중 운전자가 차 시트에 앉았다 일어나면 옷과 시트의 마찰로 몸에 정전기가 쌓이고, 다시 주유기를 잡을 때 방전되며 유증기에 불이 붙는 사고가 실제로 보고된다. 그래서 주유 중에는 차에 다시 타지 말고, 부득이 탔다면 주유기를 잡기 전 차체 금속을 만져 정전기를 미리 흘려보내는 것이 안전하다." },
      { cat:"생활 상식", stmt:"기름에 불이 붙었을 때 물을 부으면 빨리 꺼진다.", isTrue:false, truth:"끓는 기름 위에 물을 부으면 물이 순간적으로 끓어 수증기로 폭발하듯 팽창하면서 불붙은 기름을 사방으로 튀게 해 불길이 오히려 폭발적으로 커진다. 기름 화재는 뚜껑을 덮어 산소를 차단하거나 K급(주방용) 소화기를 써야 하고, 절대 물을 부으면 안 된다." },
      { cat:"생활 상식", stmt:"번개 칠 때 자동차 안은 고무 타이어 덕분에 안전하다.", isTrue:false, truth:"자동차 안이 비교적 안전한 것은 맞지만 이유가 고무 타이어 때문은 아니다. 금속 차체가 일종의 패러데이 상자처럼 작용해 벼락이 쳐도 전류가 차체 표면을 타고 흘러 땅으로 빠져나가기 때문이다. 그래서 창문을 닫고 금속 부분을 만지지 않는 것이 중요하다." },
      { cat:"생활 상식", stmt:"추운 날 술을 마시면 몸이 실제로 따뜻해진다.", isTrue:false, truth:"술을 마시면 피부 혈관이 확장되어 피부로 피가 몰리면서 잠깐 따뜻하게 느껴질 뿐, 그만큼 몸 중심부의 열이 피부를 통해 더 빨리 빠져나가 심부 체온은 오히려 떨어진다. 그래서 한겨울에 술을 마시고 추위를 못 느끼다 저체온증에 빠지는 사고가 생긴다." },
      { cat:"생활 상식", stmt:"박쥐는 눈이 멀어서 아무것도 보지 못한다.", isTrue:false, truth:"'박쥐처럼 눈멀었다'는 말이 있지만 박쥐는 대부분 정상적으로 볼 수 있으며, 일부 큰박쥐류는 사람보다 시력이 좋기도 하다. 작은박쥐류가 어둠 속에서 초음파 반향정위(에코로케이션)로 사냥하는 능력이 워낙 뛰어나 눈이 안 보인다는 오해가 생긴 것이다." },
      { cat:"생활 상식", stmt:"낙타의 혹에는 물이 저장되어 있어 며칠씩 물 없이 버틴다.", isTrue:false, truth:"낙타 혹에 들어 있는 것은 물이 아니라 지방이다. 이 지방을 대사하면 에너지와 함께 약간의 물이 나오긴 하지만, 낙타가 오래 버티는 진짜 비결은 체온 변화 허용, 농축된 소변, 적혈구 구조 등 몸 전체의 탈수 적응 능력이다. 혹은 물탱크가 아니라 에너지 저장고다." },
      { cat:"생활 상식", stmt:"달걀을 물에 넣었을 때 위로 뜨면 상해서 먹으면 안 되는 것이다.", isTrue:false, truth:"달걀이 물에 뜨는 것은 시간이 지나며 껍질의 미세 구멍으로 수분이 빠지고 내부 공기주머니가 커졌기 때문으로, 신선도가 떨어졌다는 신호일 뿐 반드시 상했다는 뜻은 아니다. 뜨는 달걀도 깨서 냄새와 상태를 확인하면 멀쩡한 경우가 많아, 뜸 여부는 절대적 부패 판정 기준이 아니다." },
      { cat:"생활 상식", stmt:"전자레인지로 데운 음식은 방사능에 오염되어 몸에 해롭다.", isTrue:false, truth:"전자레인지는 마이크로파로 음식 속 물 분자를 진동시켜 열을 내는 방식으로, 방사선 피폭이나 방사능 오염과는 전혀 관계가 없다. 마이크로파는 X선·감마선 같은 전리방사선이 아니라 에너지가 낮은 비전리 전자기파라 음식이나 사람의 분자 구조를 방사능화하지 않는다." }
    ] },
    { id:'parenting', emoji:'👶', title:'육아 상식', sub:'알쏭달쏭 육아 OX', type:'ox', cards:[
      { stmt:"신생아는 푹신한 베개를 베고 두꺼운 이불을 덮어 재워야 포근하고 안전하다.", isTrue:false, truth:"푹신한 베개·이불·인형은 영아 돌연사·질식 위험을 높입니다. 단단하고 평평한 매트리스에 침구 없이 재우는 것이 공인 안전지침입니다." },
      { stmt:"생후 1년까지 아기는 등을 대고 바로 눕혀 재우는 것이 가장 안전하다.", isTrue:true, truth:"등을 대고 재우기(supine)는 영아 돌연사증후군 위험을 크게 낮추는 가장 확립된 권고입니다. 엎드려·옆으로 재우기는 권장되지 않습니다." },
      { stmt:"아기가 토할까 봐 옆으로 눕혀 재우는 것이 등으로 재우는 것보다 안전하다.", isTrue:false, truth:"옆으로 재우면 엎드린 자세로 굴러갈 수 있어 위험이 오히려 높습니다. 건강한 아기는 등을 대고 재워도 흡인 위험이 증가하지 않습니다." },
      { stmt:"신생아실 온도를 높이고 옷을 두껍게 입혀 항상 따뜻하게 해주는 것이 좋다.", isTrue:false, truth:"과도한 보온(과열)은 영아 돌연사 위험요인으로 알려져 있습니다. 실내는 적정 온도를 유지하고 너무 두껍게 싸매지 않는 것이 권장됩니다." },
      { stmt:"이가 날 때 열이 펄펄 나면 그건 이앓이 때문이니 걱정할 필요 없다.", isTrue:false, truth:"치아 발달로 미열·잇몸 불편은 있을 수 있지만 고열은 이앓이로 설명되지 않습니다. 고열이 있으면 다른 원인을 확인해야 합니다." },
      { stmt:"아기에게 꿀을 먹이면 영양에 좋으므로 돌 전부터 줘도 괜찮다.", isTrue:false, truth:"돌(만 12개월) 이전 영아에게 꿀은 영아 보툴리눔증 위험이 있어 금지됩니다. 첫돌이 지난 뒤 주는 것이 안전합니다." },
      { stmt:"백색 소음이나 흔들기로 달랜다고 해도 아기를 세게 흔드는 행동은 절대 금물이다.", isTrue:true, truth:"아기를 세게 흔들면 흔들린 아기 증후군(뇌손상)을 유발할 수 있습니다. 부드러운 달래기와 달리, 격하게 흔드는 행동은 절대 해서는 안 됩니다." },
      { stmt:"신생아 방에 푹신한 범퍼 가드를 둘러주면 부딪힘을 막아 더 안전하다.", isTrue:false, truth:"아기침대 범퍼는 질식·끼임·목졸림 위험이 있어 사용하지 않도록 권고됩니다. 침대 안은 비워두는 것이 안전합니다." },
      { stmt:"아기와 같은 침대(어른 침대)에서 함께 자면 더 안전하고 좋다.", isTrue:false, truth:"어른 침대에서의 동침은 깔림·질식·추락 위험을 높입니다. 같은 방에서 별도의 아기용 잠자리를 쓰는 룸셰어링이 권장됩니다." },
      { stmt:"열성경련을 할 때 아이 입에 손가락이나 물건을 넣어 혀를 깨물지 않게 해야 한다.", isTrue:false, truth:"경련 중 입에 무언가를 넣으면 질식·치아손상·물림 부상 위험이 큽니다. 옆으로 눕히고 주변을 안전하게 한 뒤 지켜보는 것이 권장됩니다." },
      { stmt:"분유는 끓였다 식힌 물로 타고, 먹다 남긴 분유는 오래 보관하지 않는다.", isTrue:true, truth:"안전한 물로 조제하고 먹다 남긴 분유는 세균 번식 위험이 있어 일정 시간 내 버리는 것이 일반적 권고입니다. 보관·조제 위생은 중요합니다." },
      { stmt:"신생아는 매일 비누로 전신 목욕을 시켜야 피부가 건강해진다.", isTrue:false, truth:"신생아는 매일 비누 목욕이 꼭 필요하지 않고 잦은 세정은 피부를 건조하게 할 수 있습니다. 주 2~3회 정도와 부위별 청결로 충분한 경우가 많습니다." },
      { stmt:"갓 태어난 아기는 시력이 완성되어 멀리 있는 것도 또렷하게 본다.", isTrue:false, truth:"신생아는 약 20~30cm 거리의 가까운 사물에 초점이 맞고 시력은 서서히 발달합니다. 멀리 있는 것은 또렷하게 보지 못합니다." },
      { stmt:"이앓이용 젤이나 호박 목걸이는 아기에게 안전한 진정 수단이다.", isTrue:false, truth:"호박 목걸이는 목졸림·질식 위험이 있고, 일부 마취 성분(벤조카인) 젤도 영아에게 권장되지 않습니다. 차가운 치발기 등 안전한 방법이 권장됩니다." },
      { stmt:"우는 아기를 안아주면 버릇이 나빠지므로 울게 내버려 둬야 한다.", isTrue:false, truth:"어린 영아를 안아 달래는 것은 버릇을 망치지 않으며 애착과 안정에 도움이 됩니다. 반응적인 양육은 정상적이고 권장됩니다." },
      { stmt:"이유식은 보통 생후 6개월 무렵부터 시작하며 너무 일찍 시작하지 않는다.", isTrue:true, truth:"고형식은 대략 생후 6개월(준비 신호와 함께) 전후 시작이 일반적 권고입니다. 4개월 이전의 이른 시작은 권장되지 않습니다." },
      { stmt:"아기 코가 막히면 입으로 직접 콧물을 세게 빨아내는 게 가장 좋다.", isTrue:false, truth:"식염수와 콧물흡인기 사용이 권장되며, 입으로 직접 세게 빨면 감염 전파·점막 손상 우려가 있습니다. 부드러운 방법이 안전합니다." },
      { stmt:"열이 날 때 알코올로 몸을 닦아주면 빨리 열이 내려 좋다.", isTrue:false, truth:"알코올 마찰은 피부 흡수·중독·급격한 체온변화 위험이 있어 권장되지 않습니다. 미지근한 물수건과 적절한 수분 보충이 안전합니다." },

      { q:"病院（びょういん）", choices:["학교","은행","병원","우체국"], answer:2, explain:"びょういん. '병원'. 美容院(びよういん, 미용실)과 발음 주의." },
      { q:"元気（げんき）", choices:["건강함·활기참","피곤함","조용함","바쁨"], answer:0, explain:"げんき. '건강함, 활기참'. お元気ですか = 잘 지내세요?" },
      { q:"高い（たかい）", choices:["싸다","낮다","비싸다·높다","넓다"], answer:2, explain:"たかい. '비싸다' 또는 '높다' 둘 다 의미. 반대는 安い(싸다)·低い(낮다)." },
      { q:"新しい（あたらしい）", choices:["오래된","새로운","어려운","쉬운"], answer:1, explain:"あたらしい. '새로운'. 반대말은 古い(ふるい, 오래된)." },
      { q:"飲み物（のみもの）", choices:["음식","음료·마실 것","과일","채소"], answer:1, explain:"のみもの. 飲む(마시다)+物(것) = '마실 것, 음료'. 食べ物(たべもの, 음식)과 짝." },
      { q:"天気（てんき）", choices:["날씨","온도","계절","바람"], answer:0, explain:"てんき. '날씨'. いい天気 = 좋은 날씨." },
      { q:"忙しい（いそがしい）", choices:["한가하다","바쁘다","즐겁다","슬프다"], answer:1, explain:"いそがしい. '바쁘다'. 仕事で忙しい = 일로 바쁘다." },
      { q:"使う（つかう）", choices:["만들다","사용하다","버리다","찾다"], answer:1, explain:"つかう. '사용하다, 쓰다'. お金を使う = 돈을 쓰다." },
      { q:"会社（かいしゃ）", choices:["회사","학교","가게","공장"], answer:0, explain:"かいしゃ. '회사'. 会社員(かいしゃいん) = 회사원." },
      { q:"映画（えいが）", choices:["음악","영화","연극","책"], answer:1, explain:"えいが. '영화'. 映画を見る = 영화를 보다." },
      { q:"質問（しつもん）", choices:["대답","질문","설명","대화"], answer:1, explain:"しつもん. '질문'. 質問する = 질문하다. 答え(こたえ, 대답)와 짝." },
      { q:"旅行（りょこう）", choices:["여행","산책","출근","이사"], answer:0, explain:"りょこう. '여행'. 旅行に行く = 여행을 가다." },
      { q:"覚える（おぼえる）", choices:["잊다","기억하다·외우다","가르치다","묻다"], answer:1, explain:"おぼえる. '기억하다, 외우다'. 반대 어감은 忘れる(わすれる, 잊다)." }
    ] }
  ];

  const ROUND = 10;
  let pack = null, deck = [], idx = 0, correct = 0, answered = false, btns = [];

  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  // ── 허브 렌더 ──
  function renderHub(){
    const el = $('packs'); el.innerHTML='';
    PACKS.forEach(p => {
      const ready = p.cards.length > 0;
      const d = document.createElement('div');
      d.className = 'pack' + (ready ? '' : ' soon');
      d.innerHTML = `<div class="pe">${p.emoji}</div><h3>${p.title}</h3><div class="ps">${p.sub}</div>`
        + `<span class="pc">${ready ? (p.cards.length + '문제') : '준비 중'}</span>`;
      if (ready) d.addEventListener('click', () => startPack(p));
      el.appendChild(d);
    });
  }

  // ── 안 본 문제 우선으로 라운드 뽑기 (다시 풀어도 새 문제) ──
  function pickRound(p){
    const key = 'quizseen_' + p.id;
    let seen = []; try { seen = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){}
    if (!Array.isArray(seen)) seen = [];
    const all = p.cards.map((_,i)=>i);
    let unseen = all.filter(i => !seen.includes(i));
    const n = Math.min(ROUND, p.cards.length);
    if (unseen.length < n){ seen = []; unseen = all.slice(); }    // 다 봤으면 리셋
    const chosen = shuffle(unseen).slice(0, n);
    seen = [...new Set([...seen, ...chosen])];
    try { localStorage.setItem(key, JSON.stringify(seen)); } catch(e){}
    return chosen.map(i => p.cards[i]);
  }

  function show(view){ ['hub','quiz','resultWrap'].forEach(v => $(v).classList.toggle('hide', v!==view)); }

  function startPack(p){
    pack = p; deck = pickRound(p); idx = 0; correct = 0;
    show('quiz'); showCard();
  }

  function showCard(){
    answered = false;
    const c = deck[idx];
    $('cat').textContent = c.cat || pack.title;
    $('stmt').textContent = (pack.type==='ox') ? c.stmt : c.q;
    $('ask').textContent = (pack.type==='ox') ? '이 말, 진짜일까요 가짜일까요?' : '알맞은 뜻을 고르세요';
    $('pcount').textContent = (idx+1) + ' / ' + deck.length;
    $('barFill').style.width = (idx / deck.length * 100) + '%';
    $('reveal').classList.remove('show');
    renderChoices(c);
  }

  function renderChoices(c){
    const ch = $('choices'); ch.innerHTML=''; btns=[];
    if (pack.type==='ox'){
      ch.className = 'choices row';
      btns.push(mkBtn('⭕ 진짜', 'real', () => answer(true)));
      btns.push(mkBtn('❌ 가짜', 'fake', () => answer(false)));
    } else {
      ch.className = 'choices col';
      c.choices.forEach((txt,i) => btns.push(mkBtn(txt, 'mcq', () => answer(i))));
    }
    btns.forEach(b => ch.appendChild(b));
  }
  function mkBtn(txt, cls, fn){ const b=document.createElement('button'); b.className=cls; b.textContent=txt; b.addEventListener('click', fn); return b; }

  function answer(val){
    if (answered) return; answered = true;
    const c = deck[idx];
    let right, correctIdx;
    if (pack.type==='ox'){ right = (val===c.isTrue); correctIdx = c.isTrue ? 0 : 1; }
    else { right = (val===c.answer); correctIdx = c.answer; }
    if (right) correct++;
    btns.forEach((b,i) => { b.disabled = true; if (i===correctIdx) b.classList.add('correct'); });
    if (!right){ const pick = (pack.type==='ox') ? (val?0:1) : val; if (btns[pick]) btns[pick].classList.add('wrong'); }
    $('verdict').textContent = right ? '정답! 🎉' : '땡! 🙊';
    $('verdict').className = 'verdict ' + (right ? 'ok' : 'no');
    if (pack.type==='ox') $('truth').innerHTML = '<b>' + (c.isTrue ? '진짜예요.' : '가짜예요.') + '</b> ' + c.truth;
    else $('truth').innerHTML = '정답: <b>' + c.choices[c.answer] + '</b>' + (c.explain ? ' — ' + c.explain : '');
    $('reveal').classList.add('show');
    $('barFill').style.width = ((idx+1)/deck.length*100) + '%';
  }

  $('btn' ); // noop
  $('nextBtn').addEventListener('click', () => { idx++; if (idx>=deck.length) showResult(); else showCard(); });

  function showResult(){
    show('resultWrap');
    const total = deck.length, wrong = total - correct, pct = Math.round(correct/total*100);
    $('rscore').textContent = correct + '/' + total;
    let msg;
    if (wrong===0) msg = '완벽! 다 맞혔어요 👏';
    else if (pct>=70) msg = '오 좀 아는데요? 👍';
    else if (pct>=40) msg = '의외로 많이 속았네요 🤔';
    else msg = '헉, 우리가 아는 게 이렇게 틀렸다고? 😱';
    $('rmsg').textContent = msg;
    $('rsub').textContent = `[${pack.title}] ${total}개 중 ${wrong}개 틀렸어요`;
  }

  $('againBtn').addEventListener('click', () => startPack(pack));
  $('homeBtn').addEventListener('click', () => { renderHub(); show('hub'); });
  $('shareBtn').addEventListener('click', async () => {
    const total = deck.length, wrong = total - correct;
    const text = `[퀴즈 한 입 · ${pack.title}] 나 ${total}개 중 ${wrong}개 틀렸어 😅 너도 해봐!\n${BASE}`;
    let ok = true;
    try { if (navigator.share) await navigator.share({ text }); else await navigator.clipboard.writeText(text); }
    catch(e){
      try { const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.focus(); ta.select(); ok=document.execCommand('copy'); ta.remove(); }
      catch(e2){ ok=false; }
    }
    const b=$('shareBtn'); const o=b.textContent;
    b.textContent = ok ? '✓ 복사됨!' : '공유 실패'; b.classList.toggle('done', ok);
    setTimeout(()=>{ b.textContent=o; b.classList.remove('done'); }, 1800);
  });

  renderHub();
</script>
</body>
</html>
