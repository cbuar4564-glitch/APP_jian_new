<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>진짜야? — 생활 상식 오해 퀴즈</title>
<style>
  :root{
    --bg1:#f0fbf8; --bg2:#e2f5ef; --ink:#15302a; --sub:#5f7d74; --card:#ffffff;
    --line:#d6ece4; --accent:#10b585; --accent-d:#0a9c70; --o:#10b585; --x:#ef6b5b;
    --gold:#f5b62e; --shadow:0 8px 26px rgba(20,120,90,.13);
  }
  *{box-sizing:border-box}
  body{
    margin:0; color:var(--ink); min-height:100vh;
    background:radial-gradient(900px 500px at 80% -10%, #c8f0e3 0%, transparent 55%), linear-gradient(160deg,var(--bg1),var(--bg2));
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:500px; margin:0 auto; padding:18px 16px 50px;}
  .backlink{display:inline-block; margin-bottom:8px; color:var(--sub); font-size:12.5px; text-decoration:none;}
  .backlink:hover{color:var(--accent);}
  header h1{font-size:23px; margin:2px 0 2px;}
  header p{margin:0 0 14px; color:var(--sub); font-size:13.5px;}

  .progress{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .bar{flex:1; height:9px; background:#d6ece4; border-radius:99px; overflow:hidden;}
  .bar > div{height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width .3s;}
  .pcount{font-size:12.5px; color:var(--sub); font-weight:700; white-space:nowrap;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px 18px; box-shadow:var(--shadow); text-align:center;}
  .cat{display:inline-block; font-size:11.5px; font-weight:800; color:var(--accent-d); background:#e3f7f0; border-radius:999px; padding:4px 11px; margin-bottom:14px;}
  .stmt{font-size:21px; font-weight:800; line-height:1.5; min-height:80px; display:flex; align-items:center; justify-content:center; word-break:keep-all;}
  .ask{font-size:13px; color:var(--sub); margin:6px 0 16px;}
  .choices{display:flex; gap:10px;}
  .choices button{
    flex:1; padding:18px 8px; border:2px solid var(--line); background:#fff; border-radius:16px;
    font-size:18px; font-weight:900; cursor:pointer; transition:.12s;
  }
  .choices .real{color:var(--o);} .choices .fake{color:var(--x);}
  .choices button:active{transform:scale(.97);}
  .choices button:disabled{opacity:.45; cursor:default;}

  .reveal{display:none; margin-top:16px;}
  .reveal.show{display:block; animation:pop .3s ease;}
  @keyframes pop{from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1}}
  .verdict{font-size:22px; font-weight:900; margin-bottom:6px;}
  .verdict.ok{color:var(--o);} .verdict.no{color:var(--x);}
  .truth{font-size:14.5px; color:#33514a; background:#f3faf7; border:1px solid var(--line); border-radius:12px; padding:13px; text-align:left;}
  .next{margin-top:12px; width:100%; padding:14px; border:0; border-radius:14px; background:var(--accent); color:#fff; font-size:16px; font-weight:800; cursor:pointer;}
  .next:active{background:var(--accent-d);}

  .result{display:none; text-align:center;}
  .result.show{display:block;}
  .result .big{font-size:54px; font-weight:900; color:var(--accent-d); margin:6px 0 0;}
  .result .msg{font-size:16px; font-weight:800; margin:4px 0 2px;}
  .result .sub{font-size:13.5px; color:var(--sub); margin-bottom:16px;}
  .result .row{display:flex; gap:10px;}
  .result .row button{flex:1; padding:13px; border-radius:13px; font-weight:800; font-size:14.5px; cursor:pointer;}
  .share{border:0; background:var(--accent); color:#fff;} .share.done{background:var(--gold); color:#3a2a00;}
  .again{border:1px solid var(--line); background:#fff; color:var(--accent-d);}

  .notice{margin-top:16px; background:#fff8ec; border:1px solid #fde7c0; color:#8a5a16; font-size:12px; border-radius:12px; padding:10px 12px;}
  footer{text-align:center; color:#9bb8af; font-size:11.5px; margin-top:16px;}
  .promo{display:block; text-align:center; margin-top:8px; font-size:12.5px; color:var(--accent-d); text-decoration:none; font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="../index.html">← 다른 앱 보기</a>
  <header>
    <h1>❓ 진짜야?</h1>
    <p>다들 맞다고 믿는 생활 상식, 진짜일까 가짜일까? 맞혀보세요.</p>
  </header>

  <!-- 퀴즈 -->
  <div id="quiz">
    <div class="progress"><div class="bar"><div id="barFill"></div></div><span class="pcount" id="pcount">1 / 10</span></div>
    <div class="card">
      <span class="cat" id="cat">생활</span>
      <div class="stmt" id="stmt">—</div>
      <div class="ask">이 말, 진짜일까요 가짜일까요?</div>
      <div class="choices">
        <button class="real" id="btnReal">⭕ 진짜</button>
        <button class="fake" id="btnFake">❌ 가짜</button>
      </div>
      <div class="reveal" id="reveal">
        <div class="verdict" id="verdict">—</div>
        <div class="truth" id="truth"></div>
        <button class="next" id="nextBtn">다음 →</button>
      </div>
    </div>
    <div class="notice">💡 재미·참고용 상식이에요. 건강·의학 관련은 전문가·약사와 상담하세요.</div>
  </div>

  <!-- 결과 -->
  <div class="card result" id="result">
    <div class="msg" id="rmsg">결과</div>
    <div class="big" id="rscore">0/10</div>
    <div class="sub" id="rsub"></div>
    <div class="row">
      <button class="share" id="shareBtn">결과 공유 📋</button>
      <button class="again" id="againBtn">다시 풀기</button>
    </div>
  </div>

  <a class="promo" href="#" id="promo" style="display:none;">🎬 더 자세한 이야기는 유튜브에서</a>
  <footer>진짜야? · 모든 처리는 기기 안에서만 · 재미·참고용</footer>
</div>

<script>
  const $ = id => document.getElementById(id);

  // ── 카드 덱 (검증된 생활 상식 오해 카드) ──
  const CARDS = [
    // 청소·생활
    { stmt:'거품이 풍성하게 많이 날수록 더 깨끗하게 닦인다', isTrue:false, cat:'청소·생활', truth:'거품의 양과 세척력은 관계가 없어요. 때를 떼는 건 세정 성분과 문지르는 힘이고, 거품을 거의 안 내는 세제도 잘 닦여요.' },
    { stmt:'락스와 식초를 섞으면 더 강력한 청소 효과가 난다', isTrue:false, cat:'청소·생활', truth:'두 가지를 섞으면 유독한 염소 가스가 나와 위험해요. 효과가 좋아지긴커녕 호흡기에 해로우니 절대 섞지 마세요.' },
    { stmt:'세제는 권장량보다 많이 넣을수록 빨래가 더 깨끗해진다', isTrue:false, cat:'청소·생활', truth:'많이 넣으면 헹굼으로 다 빠지지 않아 옷·세탁기에 잔여물이 남아요. 냄새·피부자극의 원인이 될 수 있어요.' },
    { stmt:'뜨거운 물로 손을 씻어야 세균이 더 잘 제거된다', isTrue:false, cat:'청소·생활', truth:'사람이 견디는 온도로는 세균이 안 죽어요. 중요한 건 온도가 아니라 비누로 20초 이상 충분히 문질러 헹구는 거예요.' },
    { stmt:'주방 행주·수세미가 화장실 변기보다 세균이 더 많을 수 있다', isTrue:true, cat:'청소·생활', truth:'진짜예요. 젖어 있고 음식 찌꺼기가 남아 세균 번식에 최적이라, 변기보다 더 많이 검출되기도 해요. 자주 삶거나 바꿔주세요.' },
    { stmt:'베이킹소다와 식초를 섞으면 강력한 만능 세정제가 된다', isTrue:false, cat:'청소·생활', truth:'둘을 섞으면 산-염기 중화로 효과가 서로 상쇄돼 세정력이 세지지 않아요. 보글거림은 이산화탄소가 빠지는 반응일 뿐이에요.' },
    // 건강·몸
    { stmt:'손가락 관절을 꺾어 "뚝" 소리를 내면 관절염에 걸린다', isTrue:false, cat:'건강·몸', truth:'그 소리는 관절액 속 기포가 터지는 거예요. 관절염을 일으킨다는 근거는 약해요(무리하게 꺾는 습관은 비권장).' },
    { stmt:'사람은 평소 뇌의 10%만 사용한다', isTrue:false, cat:'건강·몸', truth:'뇌 영상 연구에서 하루 중 거의 모든 영역이 활동해요. "10%만 쓴다"는 유명한 속설이에요.' },
    { stmt:'어두운 곳에서 책을 읽으면 시력이 영구적으로 나빠진다', isTrue:false, cat:'건강·몸', truth:'눈이 피로하고 일시적으로 불편할 수 있지만, 그 자체가 시력을 영구히 망친다는 근거는 약해요.' },
    { stmt:'성인의 정상 체온은 항상 정확히 36.5도다', isTrue:false, cat:'건강·몸', truth:'정상 체온은 사람·시간·부위에 따라 36~37.5도로 달라요. 36.5도는 평균에 가까운 값일 뿐이에요.' },
    { stmt:'위(胃) 안쪽 점막은 며칠 단위로 계속 새것으로 교체된다', isTrue:true, cat:'건강·몸', truth:'맞아요. 위 점막 세포는 강한 위산에 노출돼 빠르게 손상되고, 대체로 며칠 주기로 새 세포로 교체돼요.' },
    { stmt:'감기에는 항생제가 잘 듣는다', isTrue:false, cat:'건강·몸', truth:'감기는 대부분 바이러스 때문이고 항생제는 세균에만 들어요. (복용은 전문가 안내에 따르세요)' },
    { stmt:'면도를 하면 털이 더 굵고 검게 자란다', isTrue:false, cat:'건강·몸', truth:'굵어 보이는 건 잘린 단면 때문이에요. 실제 털의 굵기나 색은 면도로 바뀌지 않아요.' },
    { stmt:'물은 누구나 하루에 꼭 2리터를 마셔야 한다', isTrue:false, cat:'건강·몸', truth:'정해진 양은 없어요. 음식·활동량·개인차에 따라 필요한 수분량이 달라요.' },
    // 음식·영양
    { stmt:'MSG(글루타민산나트륨)는 몸에 해로워 먹으면 두통이 생긴다', isTrue:false, cat:'음식', truth:'MSG는 다시마·토마토·치즈에도 든 감칠맛 성분으로, 보통 조미량에서 해롭다는 근거는 없어요. "중국집 증후군"도 재현 연구에서 입증되지 못했어요.' },
    { stmt:'갈색 설탕(흑설탕)은 흰 설탕보다 훨씬 건강에 좋다', isTrue:false, cat:'음식', truth:'흑설탕은 흰 설탕에 당밀을 약간 더한 것일 뿐 영양 차이는 거의 없어요. 칼로리·혈당 영향도 비슷해요.' },
    { stmt:'당근을 많이 먹으면 피부가 주황빛으로 변할 수 있다', isTrue:true, cat:'음식', truth:'진짜예요. 베타카로틴을 과다 섭취하면 피부가 주황빛이 도는 "카로틴혈증"이 생길 수 있어요. 대체로 무해하고 줄이면 돌아와요.' },
    { stmt:'유통기한이 지난 식품은 그 날짜가 지나면 바로 먹으면 안 된다', isTrue:false, cat:'음식', truth:'유통기한은 "판매 가능 기한"이라 보관만 잘하면 그 뒤로도 먹을 수 있는 경우가 많아요. 실제 기준은 "소비기한"에 가까워요.' },
    { stmt:'꿀은 상온에서 거의 상하지 않고 아주 오래 보관할 수 있다', isTrue:true, cat:'음식', truth:'맞아요. 꿀은 수분이 적고 천연 산성이라 세균이 잘 못 자라 밀봉하면 오래가요. 단 만 1세 미만 아기에겐 주지 마세요(보툴리눔균).' },
    // 과학·자연
    { stmt:'박쥐는 눈이 멀어서 아무것도 못 본다', isTrue:false, cat:'과학·자연', truth:'박쥐는 대부분 눈이 있고 볼 수 있어요. 어두운 곳에선 초음파를 함께 쓸 뿐, 시력이 아예 없는 건 아니에요.' },
    { stmt:'금붕어의 기억력은 3초밖에 안 된다', isTrue:false, cat:'과학·자연', truth:'금붕어는 몇 달까지 기억한다는 연구가 여럿 있어요. 먹이 시간이나 미로 길을 학습해 기억해요.' },
    { stmt:'낙타의 혹에는 물이 들어 있다', isTrue:false, cat:'과학·자연', truth:'혹에는 물이 아니라 주로 지방이 저장돼 있어요. 이 지방을 에너지로 쓰며 일부 물도 만들어져요.' },
    { stmt:'번개는 같은 자리에 두 번 치지 않는다', isTrue:false, cat:'과학·자연', truth:'번개는 같은 곳에 여러 번 칠 수 있어요. 특히 높은 건물·탑은 한 해에도 수십 번 맞아요.' },
    { stmt:'꿀벌은 사람을 쏘면 대부분 자기도 죽는다', isTrue:true, cat:'과학·자연', truth:'맞아요. 꿀벌 침은 미늘이 있어 피부에 박히면 내장 일부가 떨어져 나와 죽어요. 단 말벌은 여러 번 쏘고도 안 죽어요.' },
    { stmt:'비 올 때 뛰어가면 걷는 것보다 덜 젖는다', isTrue:true, cat:'과학·자연', truth:'진짜! 비를 맞는 시간이 줄어들어 대체로 덜 젖어요.' },
    // 돈·기기
    { stmt:'스마트폰 백그라운드 앱을 자주 꺼주면 배터리가 오래간다', isTrue:false, cat:'돈·기기', truth:'요즘 폰은 백그라운드 앱을 거의 전력 안 쓰게 관리해요. 오히려 자꾸 닫으면 다시 켤 때 전력을 더 쓸 수 있어요.' },
    { stmt:'USB 3 포트는 낮은 번호 포트보다 무조건 빠르다', isTrue:false, cat:'돈·기기', truth:'숫자는 포트 규격이고, 실제 속도는 포트·케이블·기기가 모두 상위 규격일 때만 빨라져요. 케이블이 구형이면 USB3 포트도 느려요.' },
    { stmt:'충전기를 콘센트에 꽂아만 두고 폰을 안 꽂아도 전기요금이 꽤 나간다', isTrue:false, cat:'돈·기기', truth:'안 꽂은 충전기의 대기 전력은 0.1~0.5W로 아주 작아요. 1년 내내 꽂아둬도 전기요금은 몇백 원 안팎이에요.' },
    { stmt:'스마트폰은 0%까지 쓰고 100%까지 채우길 반복하면 배터리에 좋다', isTrue:false, cat:'돈·기기', truth:'요즘 리튬 배터리는 20~80% 사이로 자주 충전하는 게 더 오래가요.' }
  ];

  // ── 상태 ──
  const ROUND = 10;
  let deck = [], idx = 0, correct = 0, answered = false;

  function shuffle(a){ a = a.slice(); for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  function startRound(){
    deck = shuffle(CARDS).slice(0, Math.min(ROUND, CARDS.length));
    idx = 0; correct = 0;
    $('result').classList.remove('show'); $('result').style.display='none';
    $('quiz').style.display = '';
    showCard();
  }

  function showCard(){
    answered = false;
    const c = deck[idx];
    $('cat').textContent = c.cat;
    $('stmt').textContent = c.stmt;
    $('pcount').textContent = (idx+1) + ' / ' + deck.length;
    $('barFill').style.width = (idx / deck.length * 100) + '%';
    $('reveal').classList.remove('show');
    [$('btnReal'), $('btnFake')].forEach(b => { b.disabled = false; b.style.outline=''; });
  }

  function answer(userSaysTrue){
    if (answered) return;
    answered = true;
    const c = deck[idx];
    const right = (userSaysTrue === c.isTrue);
    if (right) correct++;
    $('btnReal').disabled = true; $('btnFake').disabled = true;
    // 정답 버튼 강조
    (c.isTrue ? $('btnReal') : $('btnFake')).style.outline = '3px solid var(--accent)';
    $('verdict').textContent = right ? '정답! 🎉' : '땡! 🙊';
    $('verdict').className = 'verdict ' + (right ? 'ok' : 'no');
    $('truth').innerHTML = '<b>' + (c.isTrue ? '진짜예요.' : '가짜예요.') + '</b> ' + c.truth;
    $('reveal').classList.add('show');
    $('barFill').style.width = ((idx+1) / deck.length * 100) + '%';
  }

  $('btnReal').addEventListener('click', () => answer(true));
  $('btnFake').addEventListener('click', () => answer(false));
  $('nextBtn').addEventListener('click', () => {
    idx++;
    if (idx >= deck.length) showResult();
    else showCard();
  });

  function showResult(){
    $('quiz').style.display = 'none';
    $('result').style.display = 'block'; $('result').classList.add('show');
    const total = deck.length, wrong = total - correct;
    $('rscore').textContent = correct + '/' + total;
    const pct = Math.round(correct/total*100);
    let msg;
    if (wrong === 0) msg = '상식 박사! 다 맞혔어요 👏';
    else if (pct >= 70) msg = '오 좀 아는데요? 👍';
    else if (pct >= 40) msg = '의외로 많이 속았네요 🤔';
    else msg = '헉, 우리가 아는 게 이렇게 틀렸다고? 😱';
    $('rmsg').textContent = msg;
    $('rsub').textContent = `${total}개 중 ${wrong}개나 잘못 알고 있었어요`;
  }

  $('againBtn').addEventListener('click', startRound);
  $('shareBtn').addEventListener('click', async () => {
    const total = deck.length, wrong = total - correct;
    const text = `[진짜야? 생활상식 퀴즈] 나 ${total}개 중 ${wrong}개 틀렸어 😅 너도 해봐!\nhttps://cbuar4564-glitch.github.io/APP_jian_new/truth-quiz/`;
    let ok = true;
    try {
      if (navigator.share) { await navigator.share({ text }); }
      else { await navigator.clipboard.writeText(text); }
    } catch(e){
      try { const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.focus(); ta.select(); ok=document.execCommand('copy'); ta.remove(); }
      catch(e2){ ok=false; }
    }
    const b=$('shareBtn'); const o=b.textContent;
    b.textContent = ok ? '✓ 복사됨!' : '공유 실패'; b.classList.toggle('done', ok);
    setTimeout(()=>{ b.textContent=o; b.classList.remove('done'); }, 1800);
  });

  startRound();
</script>
</body>
</html>
