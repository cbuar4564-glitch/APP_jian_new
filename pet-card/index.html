<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐾 우리 아이 자랑카드 — 펫 카드 메이커</title>
<style>
  :root{
    --ink:#28303d; --sub:#6b7686; --line:#e6ebf2; --brand:#ff7aa2; --brand2:#7a9bff;
    --bg1:#fff1f5; --bg2:#eef3ff;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.55; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px; margin:0 auto; padding:24px 16px 56px;}
  .top{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
  .back{font-size:13px; color:var(--sub); text-decoration:none;}
  h1{font-size:22px; margin:6px 0 2px;}
  .lead{color:var(--sub); font-size:13.5px; margin:0 0 18px;}

  .preview{
    background:#fff; border:1px solid var(--line); border-radius:20px; padding:14px;
    box-shadow:0 8px 26px rgba(40,60,110,.08); margin-bottom:18px;
  }
  canvas{ width:100%; height:auto; display:block; border-radius:12px; }
  .ph{
    aspect-ratio:4/5; width:100%; border-radius:12px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:8px; color:#c6cdda;
    background:repeating-linear-gradient(135deg,#f6f8fc,#f6f8fc 14px,#f1f4fa 14px,#f1f4fa 28px);
    border:2px dashed #dde3ee; font-size:14px;
  }
  .ph .big{font-size:46px;}

  .card{
    background:#fff; border:1px solid var(--line); border-radius:18px; padding:18px;
    box-shadow:0 6px 20px rgba(40,60,110,.06); margin-bottom:14px;
  }
  .card h2{font-size:14px; margin:0 0 12px; color:var(--sub); font-weight:700; letter-spacing:.2px;}
  label{display:block; font-size:13px; color:var(--sub); margin:0 0 6px;}
  input[type=text], textarea{
    width:100%; border:1px solid var(--line); border-radius:12px; padding:11px 13px;
    font-size:15px; font-family:inherit; color:var(--ink); background:#fbfcfe;
  }
  input[type=text]:focus, textarea:focus{outline:none; border-color:var(--brand);}
  textarea{resize:none; min-height:54px;}
  .field{margin-bottom:13px;}
  .row{display:flex; gap:10px;}
  .row .field{flex:1;}

  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    border:1.5px solid var(--line); background:#fbfcfe; color:var(--ink);
    border-radius:12px; padding:9px 13px; font-size:13.5px; cursor:pointer; user-select:none;
    transition:.12s; font-family:inherit;
  }
  .chip[aria-pressed="true"]{ border-color:var(--brand); background:#fff0f5; color:#d63b6e; font-weight:700; }

  .themes{display:flex; flex-wrap:wrap; gap:10px;}
  .sw{
    width:38px; height:38px; border-radius:50%; cursor:pointer; border:3px solid #fff;
    box-shadow:0 0 0 1.5px var(--line); transition:.12s;
  }
  .sw[aria-pressed="true"]{ box-shadow:0 0 0 3px var(--brand); transform:scale(1.06); }

  .slider{display:flex; align-items:center; gap:10px;}
  input[type=range]{flex:1; accent-color:var(--brand);}

  .actions{display:flex; gap:10px; margin-top:4px;}
  .btn{
    flex:1; border:none; border-radius:14px; padding:15px; font-size:15px; font-weight:700;
    cursor:pointer; font-family:inherit; transition:.12s;
  }
  .btn.primary{ background:linear-gradient(135deg,var(--brand),#ff5e8e); color:#fff; box-shadow:0 6px 16px rgba(255,94,142,.32); }
  .btn.ghost{ background:#fff; color:var(--ink); border:1.5px solid var(--line); }
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.5; cursor:default; box-shadow:none;}

  .filebtn{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    border:1.5px dashed #d3b3c4; background:#fff6fa; color:#c2466f; border-radius:14px;
    padding:14px; font-size:14.5px; font-weight:700; cursor:pointer;
  }
  input[type=file]{display:none;}

  .note{font-size:11.5px; color:var(--sub); margin-top:6px;}
  .privacy{
    margin-top:16px; font-size:12px; color:var(--sub); background:#fff; border:1px solid var(--line);
    border-radius:14px; padding:12px 14px; text-align:center;
  }
  footer{text-align:center; color:var(--sub); font-size:11px; margin-top:16px;}
  .hint{font-size:11.5px; color:var(--sub); margin:8px 0 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><a class="back" href="../index.html">← 앱 모음</a></div>
  <h1>🐾 우리 아이 자랑카드</h1>
  <p class="lead">사진 한 장으로 예쁜 자랑 카드를 만들어 인스타·카톡에 자랑해요. 사진은 폰을 떠나지 않아요.</p>

  <!-- 미리보기 -->
  <div class="preview">
    <div id="ph" class="ph"><div class="big">🐶</div>사진을 올리면 카드가 여기 보여요</div>
    <canvas id="cv" width="1080" height="1350" style="display:none"></canvas>
  </div>

  <!-- 사진 -->
  <div class="card">
    <h2>1. 사진</h2>
    <label class="filebtn" for="file">📷 반려동물 사진 올리기</label>
    <input type="file" id="file" accept="image/*" />
    <div class="field" id="posWrap" style="display:none; margin-top:14px;">
      <label>사진 위치 (위아래로 맞추기)</label>
      <div class="slider">⬆️<input type="range" id="pos" min="0" max="100" value="50" />⬇️</div>
    </div>
  </div>

  <!-- 카드 종류 -->
  <div class="card">
    <h2>2. 카드 종류</h2>
    <div class="chips" id="types"></div>
  </div>

  <!-- 내용 -->
  <div class="card">
    <h2>3. 내용</h2>
    <div class="field">
      <label>이름</label>
      <input type="text" id="name" maxlength="14" placeholder="예: 콩이" />
    </div>
    <div class="row">
      <div class="field">
        <label>종류 (선택)</label>
        <input type="text" id="breed" maxlength="16" placeholder="예: 포메라니안" />
      </div>
      <div class="field">
        <label>나이 (선택)</label>
        <input type="text" id="age" maxlength="12" placeholder="예: 3살" />
      </div>
    </div>
    <div class="field" style="margin-bottom:0;">
      <label>한마디 (선택)</label>
      <textarea id="msg" maxlength="40" placeholder="예: 세상에서 제일 귀여운 우리 강아지 💕"></textarea>
    </div>
  </div>

  <!-- 꾸미기 -->
  <div class="card">
    <h2>4. 꾸미기</h2>
    <label>테마 색</label>
    <div class="themes" id="themes" style="margin-bottom:14px;"></div>
    <label>스티커</label>
    <div class="chips" id="stickers"></div>
  </div>

  <!-- 저장/공유 -->
  <div class="card">
    <h2>5. 저장 & 자랑하기</h2>
    <div class="actions">
      <button class="btn ghost" id="dl" disabled>📥 저장</button>
      <button class="btn primary" id="share" disabled>📤 공유하기</button>
    </div>
    <p class="hint">저장한 이미지를 인스타그램·카카오톡에 올려서 자랑하면 돼요. (공유가 안 보이면 저장 후 직접 올려요)</p>
  </div>

  <div class="privacy">🔒 사진과 내용은 <b>이 기기 안에서만</b> 카드로 만들어집니다. 어디에도 전송·저장하지 않아요.</div>
  <footer>우리 아이 자랑카드 · 생활 불편 해소 MVP · 온디바이스</footer>
</div>

<script>
(function(){
  "use strict";
  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var ph = document.getElementById('ph');
  var W = 1080, H = 1350;

  var img = null;          // loaded Image
  var posY = 0.5;          // photo vertical framing 0..1

  // ---- 카드 종류 ----
  var TYPES = [
    { id:'profile', label:'프로필',     badge:'PROFILE',     deco:'paw'   },
    { id:'birthday',label:'🎂 생일',     badge:'HAPPY BIRTHDAY', deco:'party' },
    { id:'family',  label:'가족 소개',   badge:'OUR FAMILY',  deco:'heart' },
    { id:'today',   label:'오늘의 한 컷',badge:"TODAY'S CUT", deco:'star'  }
  ];
  var curType = 'profile';

  // ---- 테마 ----
  var THEMES = [
    { id:'pink',  bg:['#ffd9e6','#ffeef4'], card:'#ffffff', ink:'#3a2530', sub:'#a86b81', accent:'#ff5e8e' },
    { id:'sky',   bg:['#d6e6ff','#eef4ff'], card:'#ffffff', ink:'#22324d', sub:'#5d7aa6', accent:'#3f7bff' },
    { id:'cream', bg:['#ffeccf','#fff7ea'], card:'#ffffff', ink:'#4a3a23', sub:'#a8855a', accent:'#f0973a' },
    { id:'mint',  bg:['#cdf0e3','#ecfbf4'], card:'#ffffff', ink:'#1f4338', sub:'#4f9082', accent:'#22b894' },
    { id:'lilac', bg:['#e4d9ff','#f3eeff'], card:'#ffffff', ink:'#322353', sub:'#7e6bb0', accent:'#8a5cff' },
    { id:'dark',  bg:['#2b2f3a','#3b4150'], card:'#222732', ink:'#f2f4f8', sub:'#aab2c2', accent:'#ff7aa2' }
  ];
  var curTheme = THEMES[0];

  // ---- 스티커 ----
  var STICKERS = [
    { id:'paw',   emoji:'🐾', label:'🐾 발바닥' },
    { id:'heart', emoji:'❤️', label:'❤️ 하트' },
    { id:'star',  emoji:'⭐', label:'⭐ 별' },
    { id:'flower',emoji:'🌸', label:'🌸 꽃' }
  ];
  var sticker = { paw:true, heart:false, star:false, flower:false };

  // ---------- UI 빌드 ----------
  var typesBox = document.getElementById('types');
  TYPES.forEach(function(t){
    var b = document.createElement('button');
    b.className = 'chip'; b.textContent = t.label;
    b.setAttribute('aria-pressed', t.id === curType ? 'true':'false');
    b.onclick = function(){
      curType = t.id;
      [].forEach.call(typesBox.children, function(c,i){ c.setAttribute('aria-pressed', TYPES[i].id===curType?'true':'false'); });
      draw();
    };
    typesBox.appendChild(b);
  });

  var themesBox = document.getElementById('themes');
  THEMES.forEach(function(t){
    var b = document.createElement('button');
    b.className = 'sw';
    b.style.background = 'linear-gradient(135deg,'+t.bg[0]+','+t.bg[1]+')';
    b.setAttribute('aria-label', t.id);
    b.setAttribute('aria-pressed', t.id===curTheme.id?'true':'false');
    b.onclick = function(){
      curTheme = t;
      [].forEach.call(themesBox.children, function(c,i){ c.setAttribute('aria-pressed', THEMES[i].id===curTheme.id?'true':'false'); });
      draw();
    };
    themesBox.appendChild(b);
  });

  var stickBox = document.getElementById('stickers');
  STICKERS.forEach(function(s){
    var b = document.createElement('button');
    b.className = 'chip'; b.textContent = s.label;
    b.setAttribute('aria-pressed', sticker[s.id]?'true':'false');
    b.onclick = function(){
      sticker[s.id] = !sticker[s.id];
      b.setAttribute('aria-pressed', sticker[s.id]?'true':'false');
      draw();
    };
    stickBox.appendChild(b);
  });

  // 입력 → 다시 그리기
  ['name','breed','age','msg'].forEach(function(id){
    document.getElementById(id).addEventListener('input', draw);
  });
  var posEl = document.getElementById('pos');
  posEl.addEventListener('input', function(){ posY = posEl.value/100; draw(); });

  // 사진 로드 (기기 내에서만 처리)
  document.getElementById('file').addEventListener('change', function(e){
    var f = e.target.files && e.target.files[0];
    if(!f) return;
    var rd = new FileReader();
    rd.onload = function(ev){
      var im = new Image();
      im.onload = function(){
        img = im;
        document.getElementById('posWrap').style.display = 'block';
        ph.style.display = 'none';
        cv.style.display = 'block';
        document.getElementById('dl').disabled = false;
        document.getElementById('share').disabled = false;
        draw();
      };
      im.src = ev.target.result;
    };
    rd.readAsDataURL(f);
  });

  // ---------- 캔버스 그리기 ----------
  function rr(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function drawCover(im,x,y,w,h,oy){
    var ir = im.width/im.height, rt = w/h, sw,sh,sx,sy;
    if(ir > rt){ sh = im.height; sw = sh*rt; sx = (im.width-sw)/2; sy = 0; }
    else { sw = im.width; sh = sw/rt; sx = 0; sy = (im.height-sh)*oy; }
    ctx.drawImage(im, sx,sy,sw,sh, x,y,w,h);
  }
  function wrap(text, max, maxLines){
    var out=[], line='';
    for(var i=0;i<text.length;i++){
      var test = line + text[i];
      if(ctx.measureText(test).width > max && line){ out.push(line); line=text[i]; if(out.length>=maxLines){break;} }
      else line = test;
    }
    if(line && out.length<maxLines) out.push(line);
    return out;
  }
  function val(id){ return document.getElementById(id).value.trim(); }

  function draw(){
    if(!img) return;
    var t = curTheme;
    var type = TYPES.filter(function(x){return x.id===curType;})[0];

    // 배경
    var g = ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,t.bg[0]); g.addColorStop(1,t.bg[1]);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

    // 사진 영역 (둥근 모서리 + 흰 테두리 느낌)
    var px=70, py=80, pw=W-140, phh=760;
    ctx.save();
    ctx.shadowColor='rgba(40,40,60,.18)'; ctx.shadowBlur=34; ctx.shadowOffsetY=14;
    ctx.fillStyle='#fff'; rr(px-12,py-12,pw+24,phh+24,40); ctx.fill();
    ctx.restore();
    ctx.save(); rr(px,py,pw,phh,30); ctx.clip();
    drawCover(img, px,py,pw,phh, posY);
    ctx.restore();

    // 상단 배지
    ctx.font = '700 30px -apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif';
    var bw = ctx.measureText(type.badge).width + 56;
    var bx = (W-bw)/2, by = py+34;
    ctx.fillStyle = t.accent; rr(bx,by,bw,58,29); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(type.badge, W/2, by+30);

    // 정보 카드 (사진 아래)
    var iy = py+phh+44;
    var ih = H - iy - 70;
    ctx.save();
    ctx.shadowColor='rgba(40,40,60,.10)'; ctx.shadowBlur=24; ctx.shadowOffsetY=8;
    ctx.fillStyle = t.card; rr(px-12, iy, pw+24, ih, 34); ctx.fill();
    ctx.restore();

    var cx = W/2;
    var name = val('name') || '이름';
    var breed = val('breed'), age = val('age');
    var sub = [breed, age].filter(Boolean).join(' · ');
    var msg = val('msg');

    // 이름
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle = t.ink;
    ctx.font = '800 78px -apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif';
    ctx.fillText(name, cx, iy+118);

    // 발바닥 구분선
    ctx.font = '30px sans-serif'; ctx.fillStyle = t.accent;
    ctx.fillText('🐾  •  🐾', cx, iy+160);

    // 종류·나이
    var yy = iy+220;
    if(sub){
      ctx.fillStyle = t.sub;
      ctx.font = '500 40px -apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif';
      ctx.fillText(sub, cx, yy); yy += 66;
    }
    // 한마디
    if(msg){
      ctx.fillStyle = t.ink;
      ctx.font = '500 40px -apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif';
      var lines = wrap(msg, pw-120, 2);
      for(var i=0;i<lines.length;i++){ ctx.fillText(lines[i], cx, yy); yy += 54; }
    }

    // 스티커 흩뿌리기
    drawStickers(px,py,pw,phh, type);

    updateOutputs();
  }

  function drawStickers(px,py,pw,phh, type){
    var items = [];
    STICKERS.forEach(function(s){ if(sticker[s.id]) items.push(s.emoji); });
    // 카드 종류 기본 장식 추가
    if(type.deco==='party'){ items.push('🎉','🎈'); }
    if(items.length===0) return;
    // 사진 네 귀퉁이 근처에 배치
    var spots = [
      [px+30, py+phh-26], [px+pw-58, py+78],
      [px+pw-66, py+phh-30], [px+34, py+96]
    ];
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.font = '60px sans-serif';
    for(var i=0;i<spots.length;i++){
      var em = items[i % items.length];
      ctx.save();
      ctx.shadowColor='rgba(0,0,0,.18)'; ctx.shadowBlur=10; ctx.shadowOffsetY=3;
      ctx.fillText(em, spots[i][0], spots[i][1]);
      ctx.restore();
    }
  }

  // ---------- 저장 / 공유 ----------
  function fileName(){
    var n = val('name') || 'pet';
    return n.replace(/[^\w가-힣]/g,'') + '_자랑카드.png';
  }
  function toBlob(cb){ cv.toBlob(cb, 'image/png'); }

  document.getElementById('dl').addEventListener('click', function(){
    if(!img) return;
    toBlob(function(blob){
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = fileName();
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    });
  });

  document.getElementById('share').addEventListener('click', function(){
    if(!img) return;
    toBlob(function(blob){
      var file = new File([blob], fileName(), {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({ files:[file], title:'우리 아이 자랑카드', text:'🐾 우리 아이 자랑해요!' })
          .catch(function(){});
      } else {
        // 공유 미지원 → 저장으로 안내
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = fileName();
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
        alert('이 브라우저는 바로 공유가 안 돼요. 카드를 저장했으니 인스타·카톡에 올려 자랑하세요! 🐾');
      }
    });
  });

  function updateOutputs(){}
})();
</script>
</body>
</html>
